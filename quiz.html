<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>

    <h2>Quiz</h2>
    <p>Answer based on your first instinct.</p>

    <form id="quizForm">

      <div class="question">
        <p>1. When you wake up, what do you check first?</p>
        <label><input type="radio" name="q1" value="A"> Messages</label>
        <label><input type="radio" name="q1" value="B"> Notifications</label>
        <label><input type="radio" name="q1" value="C"> Social media</label>
        <label><input type="radio" name="q1" value="D"> Nothing</label>
      </div>

      <div class="question">
        <p>2. When stressed, you:</p>
        <label><input type="radio" name="q2" value="A"> Overthink</label>
        <label><input type="radio" name="q2" value="B"> Avoid</label>
        <label><input type="radio" name="q2" value="C"> Organize</label>
        <label><input type="radio" name="q2" value="D"> Distract yourself</label>
      </div>

      <div class="question">
        <p>3. You care more about:</p>
        <label><input type="radio" name="q3" value="A"> Others' opinions</label>
        <label><input type="radio" name="q3" value="B"> Your own feelings</label>
        <label><input type="radio" name="q3" value="C"> Both</label>
        <label><input type="radio" name="q3" value="D"> Not sure</label>
      </div>

      <div class="question">
        <p>4. You make decisions by:</p>
        <label><input type="radio" name="q4" value="A"> Instinct</label>
        <label><input type="radio" name="q4" value="B"> Thinking a lot</label>
        <label><input type="radio" name="q4" value="C"> Asking others</label>
        <label><input type="radio" name="q4" value="D"> Delaying</label>
      </div>

      <div class="question">
        <p>5. Preferred environment:</p>
        <label><input type="radio" name="q5" value="A"> Quiet</label>
        <label><input type="radio" name="q5" value="B"> Busy</label>
        <label><input type="radio" name="q5" value="C"> Organized</label>
        <label><input type="radio" name="q5" value="D"> Depends</label>
      </div>

      <div class="question">
        <p>6. Routine:</p>
        <label><input type="radio" name="q6" value="A"> Important</label>
        <label><input type="radio" name="q6" value="B"> Restricting</label>
        <label><input type="radio" name="q6" value="C"> Hard to keep</label>
        <label><input type="radio" name="q6" value="D"> Don't think about it</label>
      </div>

      <div class="question">
        <p>7. When something goes wrong:</p>
        <label><input type="radio" name="q7" value="A"> Analyze</label>
        <label><input type="radio" name="q7" value="B"> Fix it</label>
        <label><input type="radio" name="q7" value="C"> Take a break</label>
        <label><input type="radio" name="q7" value="D"> Ignore it</label>
      </div>

 <div class="question">
  <p>8. Choose the one that feels most like you:</p>
  <label><input type="radio" name="q8" value="A"> Apples</label>
  <label><input type="radio" name="q8" value="B"> The color red</label>
  <label><input type="radio" name="q8" value="C"> Staying in</label>
  <label><input type="radio" name="q8" value="D"> Soft things</label>
</div>

      <button type="submit">See My Result</button>
    </form>
  </div>

  <script>
    document.getElementById("quizForm").addEventListener("submit", function(e) {
      e.preventDefault();

      let answers = [];

      for (let i = 1; i <= 8; i++) {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);

        if (!selected) {
          alert("Please answer all questions.");
          return;
        }

        answers.push(selected.value);
      }

      localStorage.setItem("answers", JSON.stringify(answers));
      window.location.href = "result.html";
    });
  </script>
</body>
</html>
