<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
</head>
<body>

  <h2>Quiz</h2>
  <p id="progress"></p>

  <form id="quizForm">
    <p id="questionText"></p>

    <label>
      <input type="radio" name="answer" value="A">
      <span id="optionA"></span>
    </label>
    <br>

    <label>
      <input type="radio" name="answer" value="B">
      <span id="optionB"></span>
    </label>
    <br>

    <label>
      <input type="radio" name="answer" value="C">
      <span id="optionC"></span>
    </label>
    <br>

    <label>
      <input type="radio" name="answer" value="D">
      <span id="optionD"></span>
    </label>
    <br><br>

    <button type="submit" id="nextBtn">Next</button>
  </form>

  <script>
    const questions = [
      {
        question: "1. When you wake up, what do you check first?",
        options: {
          A: "Messages",
          B: "Notifications",
          C: "Social media",
          D: "Nothing"
        }
      },
      {
        question: "2. When stressed, you often:",
        options: {
          A: "Overthink",
          B: "Avoid it",
          C: "Try to organize",
          D: "Distract yourself"
        }
      },
      {
        question: "3. You care more about:",
        options: {
          A: "Others' opinions",
          B: "Your own feelings",
          C: "Both",
          D: "I don't give a shit"
        }
      },
      {
        question: "4. You make decisions by:",
        options: {
          A: "Instinct",
          B: "Overthinking",
          C: "Asking others",
          D: "Delaying"
        }
      },
      {
        question: "5. Which environment do you prefer:",
        options: {
          A: "Quiet",
          B: "Cozy",
          C: "Organized",
          D: "Depends"
        }
      },
      {
        question: "6. What do rules mean to you:",
        options: {
          A: "Important",
          B: "Restricting",
          C: "Rules are meant to be broken.",
          D: "What is that"
        }
      },
      {
        question: "7. When something goes wrong:",
        options: {
          A: "doubt yourself",
          B: "Fix it",
          C: "Take a break",
          D: "Ignore it"
        }
      },
      {
        question: "8. Which one do you like:",
        options: {
          A: "Aapples",
          B: "Red",
          C: "Staying in",
          D: "Video game"
        }
      }
    ];

    let currentQuestion = parseInt(localStorage.getItem("currentQuestion")) || 0;
    let answers = JSON.parse(localStorage.getItem("answers")) || [];

    const progress = document.getElementById("progress");
    const questionText = document.getElementById("questionText");
    const optionA = document.getElementById("optionA");
    const optionB = document.getElementById("optionB");
    const optionC = document.getElementById("optionC");
    const optionD = document.getElementById("optionD");
    const nextBtn = document.getElementById("nextBtn");

    function loadQuestion() {
      const q = questions[currentQuestion];

      progress.innerText = "Question " + (currentQuestion + 1) + " of " + questions.length;
      questionText.innerText = q.question;
      optionA.innerText = q.options.A;
      optionB.innerText = q.options.B;
      optionC.innerText = q.options.C;
      optionD.innerText = q.options.D;

      const radios = document.querySelectorAll('input[name="answer"]');
      radios.forEach(radio => radio.checked = false);

      if (answers[currentQuestion]) {
        const saved = document.querySelector(`input[name="answer"][value="${answers[currentQuestion]}"]`);
        if (saved) saved.checked = true;
      }

      if (currentQuestion === questions.length - 1) {
        nextBtn.innerText = "See My Result";
      } else {
        nextBtn.innerText = "Next";
      }
    }

    document.getElementById("quizForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const selected = document.querySelector('input[name="answer"]:checked');

      if (!selected) {
        alert("Please choose an answer.");
        return;
      }

      answers[currentQuestion] = selected.value;
      localStorage.setItem("answers", JSON.stringify(answers));

      if (currentQuestion === questions.length - 1) {
        localStorage.removeItem("currentQuestion");
        window.location.href = "result.html";
        return;
      }

      currentQuestion++;
      localStorage.setItem("currentQuestion", currentQuestion);
      loadQuestion();
    });

    loadQuestion();
  </script>

</body>
</html>
